<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MPLP Growth Cockpit</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="sidebar">
      <div class="brand">🚀 MPLP Growth</div>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Dashboard</a></li>
        <li>
          <a href="queue.html">Queue <span id="queue-badge" class="badge hidden">0</span></a>
        </li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </div>

    <div class="main-content">
      <header>
        <h1>
          Dashboard
          <span style="font-size: 14px; color: var(--text-secondary); margin-left: 10px"
            >v0.8.0</span
          >
        </h1>
        <div class="status-badge" id="global-header-stats"></div>
      </header>

      <div id="runner-alert-container" style="display: none; margin-bottom: 20px"></div>

      <div class="grid">
        <div class="card">
          <h3>Last Tick</h3>
          <div class="metric" id="last-tick">--</div>
        </div>
        <div class="card">
          <h3>Policy</h3>
          <div class="metric" id="policy-level">--</div>
        </div>
        <div class="card">
          <h3>Pending Actions</h3>
          <div class="metric">--</div>
          <!-- TODO: Fetch queue count for dashboard -->
        </div>
      </div>

      <div class="card">
        <h3>Recent Activity</h3>
        <p id="runs-empty-state" style="color: var(--text-secondary); display: none">
          No runner activity recorded yet.
        </p>
        <div style="overflow-x: auto">
          <table style="width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px">
            <thead>
              <tr
                style="
                  border-bottom: 2px solid var(--border-color);
                  color: var(--text-secondary);
                  font-size: 12px;
                  text-transform: uppercase;
                "
              >
                <th style="padding: 10px; font-weight: 600">Run ID</th>
                <th style="padding: 10px; font-weight: 600">Job / Task</th>
                <th style="padding: 10px; font-weight: 600">Status</th>
                <th style="padding: 10px; font-weight: 600">Time</th>
                <th style="padding: 10px; font-weight: 600">Preview</th>
              </tr>
            </thead>
            <tbody id="runs-table-body">
              <!-- JS Populated -->
            </tbody>
          </table>
        </div>
      </div>

      <div class="card" style="margin-top: 20px">
        <div style="display: flex; justify-content: space-between; align-items: center">
          <h3 style="margin: 0">Export Packs</h3>
          <button
            class="btn btn-outline"
            style="font-size: 11px; padding: 4px 8px"
            onclick="app.handlers.loadExportsList()"
          >
            Refresh
          </button>
        </div>
        <div style="overflow-x: auto">
          <table style="width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px">
            <thead>
              <tr
                style="
                  border-bottom: 2px solid var(--border-color);
                  color: var(--text-secondary);
                  font-size: 12px;
                  text-transform: uppercase;
                "
              >
                <th style="padding: 10px; font-weight: 600">Filename</th>
                <th style="padding: 10px; font-weight: 600">Generated At</th>
                <th style="padding: 10px; font-weight: 600">Size</th>
                <th style="padding: 10px; font-weight: 600">Download</th>
              </tr>
            </thead>
            <tbody id="exports-table-body">
              <tr>
                <td
                  colspan="4"
                  style="padding: 10px; color: var(--text-secondary); text-align: center"
                >
                  Loading existing packs...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        app.initGlobalHeader();
        app.initDashboard();
      });
    </script>
  </body>
</html>
